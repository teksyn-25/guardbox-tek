name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla-assistant:
    runs-on: ubuntu-latest
    # Scopes PERSONAL_ACCESS_TOKEN to this job: store the token as an environment
    # secret under the 'cla' environment (not a repo-level secret) so no other
    # workflow in the repo can read it. Do NOT add "required reviewers" protection
    # to this environment — with pull_request_target it would pause every CLA run.
    environment: cla
    if: |
      (github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') ||
      (github.event_name == 'pull_request_target')
    steps:
      - uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        with:
          path-to-signatures: signatures/cla.json
          path-to-document: https://github.com/teksyn-25/guardbox-tek/blob/master/docs/CLA.md
          # Signatures MUST live on an unprotected branch: master is protected
          # (required status checks), so the bot cannot commit there directly.
          branch: cla-signatures
          allowlist: teksyn-25
