name: Security Scan

on: [push, pull_request]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tools
        run: pip install bandit pip-audit

      - name: Bandit (code security scan)
        run: |
          bandit -r backend/ -f json -o bandit-report.json \
            -x backend/api/test_auth.py,backend/api/test_files.py,backend/api/test_web.py,backend/cdr/test_sanitize.py,backend/intake/test_telegram_bot.py,backend/intake/test_upload.py,backend/storage/test_local.py,backend/test_hardening.py,backend/test_rate_limit.py

      - name: pip-audit (dependency vulnerabilities)
        run: pip-audit --skip-editable

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: bandit-report.json

  flutter-audit:
    if: false  # mobile app ships in v1.1 — re-enable then
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get
        working-directory: mobile/

      - name: dart pub audit (pub.dev advisories)
        run: dart pub audit
        working-directory: mobile/
