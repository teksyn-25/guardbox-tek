<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>GuardBox</title>
  <script src="/static/alpine.min.js" defer></script>
  <script src="/static/htmx.min.js" defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    [x-cloak] { display: none !important; }

    :root {
      --bg:         #06120f;
      --bg-grad:    radial-gradient(ellipse at 50% 0%, #0a2421 0%, #06120f 55%);
      --panel:      rgba(255,255,255,.04);
      --line:       rgba(255,255,255,.08);
      --line-hi:    rgba(52,224,161,.35);
      --ink:        #eaf2f0;
      --ink-dim:    #9eb3b0;
      --ink-faint:  #5d7672;
      --safe:       #34e0a1;
      --safe-dim:   rgba(52,224,161,.12);
      --amber:      #e8b450;
      --danger:     #ff6b6b;
      --danger-dim: rgba(255,107,107,.12);
      --fd: "Space Grotesk","Segoe UI",system-ui,sans-serif;
      --fb: "Inter",system-ui,sans-serif;
      --fm: "JetBrains Mono","SF Mono",ui-monospace,monospace;
    }

    body { background: var(--bg-grad); color: var(--ink); font-family: var(--fb); min-height: 100vh; padding-bottom: 90px; }

    @keyframes rise  { from { opacity:0; transform:translateY(8px) } to { opacity:1; transform:translateY(0) } }
    @keyframes pulse { 0%,100%{opacity:.55} 50%{opacity:1} }
    @keyframes scan  { from{transform:translateY(-100%)} to{transform:translateY(2400%)} }

    .rise { animation: rise .35s ease backwards; }

    a, button { cursor:pointer; -webkit-tap-highlight-color:transparent; }
    button { background:none; border:none; color:inherit; font:inherit; transition:transform .12s,border-color .2s,background .2s; }
    button:hover  { transform:translateY(-2px); }
    button:active { transform:translateY(0); }
    :focus-visible { outline:2px solid var(--safe); outline-offset:3px; border-radius:8px; }
    @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

    .wrap { max-width:640px; margin:0 auto; padding:0 18px; }

    /* header */
    .hdr { padding:20px 0 8px; display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:8px; }
    .hdr-logo { display:flex; flex-direction:column; align-items:center; gap:6px; }
    .wordmark { font-family:var(--fd); font-weight:700; font-size:22px; letter-spacing:-.02em; color:var(--ink-faint); }
    .wordmark b { color:var(--safe); font-weight:700; }
    .btn-outline { border:1px solid var(--line); color:var(--ink-dim); font-family:var(--fm); font-size:12px; padding:7px 12px; border-radius:8px; }
    .btn-outline:hover { border-color:var(--line-hi)!important; }
    .syncing { font-family:var(--fm); font-size:12px; color:var(--amber); }

    /* stats */
    .stats { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
    .stat { background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:14px 14px 12px; display:flex; flex-direction:column; gap:6px; min-height:78px; }
    .stat-row { display:flex; align-items:center; gap:8px; }
    .stat-icon { width:22px; height:22px; border-radius:99px; display:grid; place-items:center; flex-shrink:0; }
    .stat-val { font-family:var(--fd); font-weight:700; font-size:22px; line-height:1; }
    .stat-lbl { font-size:12.5px; color:var(--ink-dim); margin-left:30px; }

    /* source folders */
    .sources { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .src-card { background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:13px 12px; text-align:left; color:var(--ink); position:relative; min-height:82px; display:flex; flex-direction:column; gap:8px; width:100%; }
    .src-card:hover { border-color:var(--line-hi)!important; }
    .src-icon { width:28px; height:28px; border-radius:8px; background:var(--safe-dim); display:grid; place-items:center; color:var(--safe); flex-shrink:0; }
    .src-name { font-weight:600; font-size:13.5px; color:var(--safe); line-height:1.15; }
    .src-count { font-size:11px; color:var(--ink-dim); margin-top:3px; font-family:var(--fm); }
    .src-check { position:absolute; top:12px; right:10px; }

    /* section header */
    .sec-hdr { display:flex; justify-content:space-between; align-items:center; margin-top:4px; }
    .sec-title { font-family:var(--fd); font-weight:600; font-size:16px; letter-spacing:-.01em; }
    .btn-clear { color:var(--ink-dim); font-family:var(--fm); font-size:11.5px; display:flex; align-items:center; gap:6px; padding:4px; }

    /* folder view */
    .file-card { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:12px; display:flex; gap:12px; align-items:center; text-align:left; color:var(--ink); width:100%; }
    .file-card:hover { border-color:var(--line-hi)!important; }
    .file-name { font-size:13.5px; font-weight:600; font-family:var(--fm); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .file-fmt  { font-size:11px; color:var(--ink-faint); font-family:var(--fm); margin-top:3px; }
    .file-stripped { font-size:11px; color:var(--safe); margin-top:5px; display:flex; align-items:center; gap:5px; font-family:var(--fm); }
    .dot { width:5px; height:5px; border-radius:99px; background:var(--safe); display:inline-block; }
    .thumb { width:52px; height:52px; border-radius:10px; flex-shrink:0; border:1px solid var(--line); position:relative; overflow:hidden; }

    /* viewer modal */
    .overlay { position:fixed; inset:0; background:rgba(2,8,7,.85); backdrop-filter:blur(6px); z-index:60; display:flex; align-items:flex-end; justify-content:center; }
    .sheet { width:100%; max-width:480px; background:#0a1916; border-top:1px solid var(--line); border-top-left-radius:20px; border-top-right-radius:20px; padding:10px 0 22px; animation:rise .3s ease; max-height:94vh; overflow-y:auto; }
    .handle { width:38px; height:4px; background:var(--line); border-radius:99px; margin:0 auto 16px; }
    .viewer-label { font-family:var(--fm); font-size:10.5px; color:var(--ink-faint); display:flex; justify-content:space-between; margin-bottom:8px; }
    .kv-table { background:rgba(0,0,0,.25); border:1px solid var(--line); border-radius:12px; overflow:hidden; margin:16px 18px; }
    .kv { display:flex; justify-content:space-between; gap:12px; padding:11px 14px; border-bottom:1px solid var(--line); }
    .kv-k { font-family:var(--fm); font-size:10.5px; color:var(--ink-faint); }
    .kv-v { font-size:12px; text-align:right; }
    .kv-accent { color:var(--safe); font-weight:600; }
    .kv-mono   { font-family:var(--fm); }
    .stripped-box { padding:11px 14px; }
    .stripped-lbl { font-family:var(--fm); font-size:10.5px; color:var(--ink-faint); margin-bottom:8px; }
    .chips { display:flex; flex-wrap:wrap; gap:6px; }
    .chip { font-family:var(--fm); font-size:10.5px; color:var(--amber); background:rgba(232,180,80,.1); border:1px solid rgba(232,180,80,.25); padding:3px 8px; border-radius:6px; }
    .claim { font-size:12.5px; color:var(--ink-dim); margin-bottom:12px; text-align:center; }
    .viewer-acts { display:flex; gap:11px; }
    .btn-del  { flex:1; border:1px solid var(--line); color:var(--ink-dim); padding:14px; border-radius:12px; font-size:14px; font-weight:600; }
    .btn-save { flex:1; background:var(--safe); border:1px solid var(--safe); color:#04231a; padding:14px; border-radius:12px; font-size:14px; font-weight:700; }

    /* containment frame */
    .cframe { position:relative; border-radius:14px; overflow:hidden; border:1px solid var(--line); background:repeating-linear-gradient(45deg,#0c211c,#0c211c 10px,#0a1916 10px,#0a1916 20px); aspect-ratio:4/3; }
    .cframe img { position:absolute; inset:0; width:100%; height:100%; object-fit:contain; transition:opacity .6s ease; }
    .cframe-scan { position:absolute; left:0; right:0; height:8%; background:linear-gradient(var(--safe-dim),rgba(52,224,161,.53),var(--safe-dim)); animation:scan 1.6s linear infinite; }
    .cframe-txt  { position:absolute; inset:0; display:grid; place-items:center; font-family:var(--fm); font-size:11px; color:var(--safe); }
    .corner { position:absolute; width:14px; height:14px; }

    /* fab */
    .fab { position:fixed; right:22px; bottom:22px; width:52px; height:52px; border-radius:99px; background:var(--safe); box-shadow:0 8px 22px rgba(52,224,161,.35); display:grid; place-items:center; z-index:40; }

    /* empty */
    .empty { text-align:center; padding:60px 20px; color:var(--ink-faint); font-size:13px; }
    .empty b { color:var(--ink); }

    /* login */
    .login-page { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:28px; padding:24px; }
    .login-desc { font-size:14px; color:var(--ink-dim); text-align:center; max-width:280px; line-height:1.6; }
    .btn-tg { background:var(--safe); color:#04231a; font-family:var(--fd); font-weight:700; font-size:15px; padding:14px 32px; border-radius:14px; display:flex; align-items:center; gap:10px; text-decoration:none; }
    .btn-tg:hover { transform:translateY(-2px); }
    .err-box { font-size:13px; color:var(--danger); background:var(--danger-dim); border:1px solid var(--danger); border-radius:10px; padding:10px 16px; }

    /* htmx request indicator */
    .htmx-request .syncing { display:inline; }
  </style>
</head>
<body hx-on::response-error="if(event.detail.xhr.status===401)window.location='/auth/login'">
  {% block body %}{% endblock %}
</body>
</html>
