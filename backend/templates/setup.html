{% extends "base.html" %}
{% block body %}
<style>
  .setup-input {
    width: 100%;
    max-width: 300px;
    background: rgba(255,255,255,.05);
    border: 1px solid var(--line);
    border-radius: 12px;
    color: var(--ink);
    font-family: var(--fb);
    font-size: 16px;
    padding: 14px 16px;
    outline: none;
    transition: border-color .2s;
  }
  .setup-input::placeholder { color: var(--ink-faint); }
  .setup-input:focus { border-color: var(--line-hi); }
  .setup-form { display:flex; flex-direction:column; align-items:center; gap:12px; width:100%; }
  .btn-setup {
    width: 100%;
    max-width: 300px;
    background: var(--safe);
    color: #04231a;
    font-family: var(--fd);
    font-weight: 700;
    font-size: 15px;
    padding: 14px;
    border-radius: 14px;
    border: none;
    cursor: pointer;
    margin-top: 4px;
    transition: transform .12s;
  }
  .btn-setup:hover { transform: translateY(-2px); }
  .setup-hint { font-size: 12px; color: var(--ink-faint); text-align: center; max-width: 280px; line-height: 1.5; }
</style>

<div class="login-page">
  <!-- GuardBox cube mark -->
  <svg width="52" height="52" viewBox="0 0 48 48" fill="none">
    <path d="M24 6L40 14V34L24 42L8 34V14L24 6Z" fill="#0a2421" stroke="var(--safe)" stroke-width="1.8" stroke-linejoin="round"/>
    <path d="M24 6V24M24 24L40 14M24 24L8 14M24 24V42" stroke="var(--safe)" stroke-width="1.4" stroke-linejoin="round"/>
  </svg>

  <div style="font-family:var(--fd);font-weight:700;font-size:28px;letter-spacing:-.02em;">
    Guard<b style="color:var(--safe)">Box</b>
  </div>

  <p class="login-desc">Create a password to secure your GuardBox.</p>

  {% if error %}
  <div class="err-box">{{ error }}</div>
  {% endif %}

  <form method="post" action="/setup" class="setup-form">
    <input
      class="setup-input"
      type="password"
      name="password"
      placeholder="Password"
      autocomplete="new-password"
      autofocus
      required
    >
    <input
      class="setup-input"
      type="password"
      name="confirm"
      placeholder="Confirm password"
      autocomplete="new-password"
      required
    >
    <p class="setup-hint">Minimum 8 characters. To reset, delete <code>.admin_password_hash</code> from your data directory.</p>
    <button type="submit" class="btn-setup">Create password</button>
  </form>
</div>
{% endblock %}
