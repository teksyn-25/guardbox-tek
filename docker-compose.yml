services:
  api:
    build:
      context: ./backend
    ports:
      - "0.0.0.0:8000:8000"
    env_file: .env
    volumes:
      - guardbox_data:/data/guardbox
    tmpfs:
      - /tmp:size=128m,mode=1777
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
      - seccomp:./seccomp-profile.json
    restart: unless-stopped

volumes:
  guardbox_data:
