services:
  api:
    build:
      context: ./backend
    ports:
      - "127.0.0.1:8000:8000"
    env_file: .env
    volumes:
      - guardbox_data:/data/guardbox
    tmpfs:
      - /tmp:size=128m,mode=1777
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
      - seccomp:./seccomp-profile.json
    restart: unless-stopped

  proxy:
    image: caddy:2-alpine
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    restart: unless-stopped

volumes:
  guardbox_data:
  caddy_data:
  caddy_config:
